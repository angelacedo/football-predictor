services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: footy
      POSTGRES_PASSWORD: footy
      POSTGRES_DB: footy
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U footy"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/angelacedo/football-predictor:latest
    environment:
      DATABASE_URL: postgresql+psycopg://footy:footy@db:5432/footy
      FOOTBALL_API_KEY: ${FOOTBALL_API_KEY}
      FOOTBALL_API_BASE: ${FOOTBALL_API_BASE}
      SPORTMONKS_API_KEY: ${SPORTMONKS_API_KEY}
      SPORTMONKS_API_BASE: ${SPORTMONKS_API_BASE}
      THESTATSAPI_KEY: ${THESTATSAPI_KEY}
      THESTATSAPI_BASE: ${THESTATSAPI_BASE}
      THE_ODDS_API_KEY: ${THE_ODDS_API_KEY}
      THE_ODDS_API_BASE: ${THE_ODDS_API_BASE}
      THE_ODDS_API_SPORT_KEY: ${THE_ODDS_API_SPORT_KEY}
      FIXTURES_PROVIDER: ${FIXTURES_PROVIDER}
      ODDS_PROVIDER_PRIMARY: ${ODDS_PROVIDER_PRIMARY}
      ODDS_PROVIDER_FALLBACK: ${ODDS_PROVIDER_FALLBACK:-}
      STATS_PROVIDER: ${STATS_PROVIDER:-}
      MODEL_DIR: ${MODEL_DIR:-models}
      EDGE_THRESHOLD: ${EDGE_THRESHOLD:-0.05}
      KELLY_FRACTION: ${KELLY_FRACTION:-0.25}
    volumes:
      - models_data:/app/models
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "scripts/predict_upcoming.py"]

  web:
    image: ghcr.io/angelacedo/football-predictor-web:latest
    environment:
      DATABASE_URL: postgresql+psycopg://footy:footy@db:5432/footy
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.footy-dashboard.rule=Host(`footy.stackmint.cloud`)"
      - "traefik.http.routers.footy-dashboard.entrypoints=websecure"
      - "traefik.http.routers.footy-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.footy-dashboard.service=footy-dashboard-svc"
      - "traefik.http.services.footy-dashboard-svc.loadbalancer.server.port=8000"

volumes:
  db_data:
  models_data:
