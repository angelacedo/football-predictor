services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: footy
      POSTGRES_PASSWORD: footy
      POSTGRES_DB: footy
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U footy"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://footy:footy@db:5432/footy
    volumes:
      - ./models:/app/models
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "scripts/predict_upcoming.py"]

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://footy:footy@db:5432/footy
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
