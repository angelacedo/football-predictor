<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>{% block title %}football-predictor{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    (function () {
      var saved = localStorage.getItem("theme");
      if (saved) document.documentElement.setAttribute("data-theme", saved);
    })();
  </script>
</head>
<body>
  <nav>
    <a href="/"{% if active == "overview" %} class="active"{% endif %}>Overview</a>
    <a href="/predictions"{% if active == "predictions" %} class="active"{% endif %}>Predictions</a>
    <a href="/models"{% if active == "models" %} class="active"{% endif %}>Models</a>
    <button id="theme-toggle" onclick="
      var cur = document.documentElement.getAttribute('data-theme')
                || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      var next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    ">&#9788;</button>
  </nav>
  <h1>{% block heading %}{% endblock %}</h1>
  {% block content %}{% endblock %}
  <footer>football-predictor — read-only, paper/backtest only, no real bets placed.</footer>
</body>
</html>
